AWSTemplateFormatVersion: '2010-09-09'
Description: 'Two-tier PKI infrastructure for air-gapped environments (qs-1qup6s5k1)'

Parameters:
  AdcaInstanceType:
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
      - m5.large
      - m5.xlarge
      - m5.2xlarge
      - m5.4xlarge
    Default: m5.xlarge
    Description: Amazon EC2 instance type for the first Active Directory server
    Type: String
  SubcaInstanceType:
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
      - m5.large
      - m5.xlarge
      - m5.2xlarge
      - m5.4xlarge
    Default: m5.xlarge
    Description: Amazon EC2 instance type for the second Active Directory server
    Type: String
  AdcaServerNetBIOSName:
    AllowedPattern: '[a-zA-Z0-9\-]+'
    Default: ADCA1
    Description: NetBIOS name of the root CA server (up to 15 characters)
    MaxLength: '15'
    MinLength: '1'
    Type: String
  SubcaServerNetBIOSName:
    AllowedPattern: '[a-zA-Z0-9\-]+'
    Default: SUBCA1
    Description: NetBIOS name of the subordinate CA server (up to 15 characters)
    MaxLength: '15'
    MinLength: '1'
    Type: String
  DomainDNSName:
    AllowedPattern: '[a-zA-Z0-9\-]+\..+'
    Default: example.com
    Description: Fully qualified domain name (FQDN) of the forest root domain
    MaxLength: '255'
    MinLength: '2'
    Type: String
  DomainNetBIOSName:
    AllowedPattern: '[a-zA-Z0-9\-]+'
    Default: EXAMPLE
    Description: NetBIOS name of the domain (up to 15 characters)
    MaxLength: '15'
    MinLength: '1'
    Type: String
  DomainAdminUser:
    AllowedPattern: '[a-zA-Z0-9]*'
    Default: Admin
    Description: User name for the account that will be added as Domain Administrator. This
      is separate from the default "Administrator" account
    MaxLength: '25'
    MinLength: '5'
    Type: String
  DomainAdminPassword:
    AllowedPattern: (?=^.{6,255}$)((?=.*\d)(?=.*[A-Z])(?=.*[a-z])|(?=.*\d)(?=.*[^A-Za-z0-9])(?=.*[a-z])|(?=.*[^A-Za-z0-9])(?=.*[A-Z])(?=.*[a-z])|(?=.*\d)(?=.*[A-Z])(?=.*[^A-Za-z0-9]))^.*
    Description: Password for the domain admin user. Must be at least 8 characters containing
      letters, numbers and symbols
    MaxLength: '32'
    MinLength: '8'
    NoEcho: 'true'
    Type: String
  VPCID:
    Description: ID of the VPC (e.g., vpc-0343606e)
    Type: AWS::EC2::VPC::Id
  SubnetID:
    Description: ID of the subnet where the PKI infrastructure will be deployed (e.g., subnet-a0246dcd)
    Type: AWS::EC2::Subnet::Id
  DomainMemberSGID:
    Description: ID of the Domain Member Security Group (e.g., sg-7f16e910)
    Type: AWS::EC2::SecurityGroup::Id
  OrganizationalUnitName:
    AllowedPattern: '[a-zA-Z0-9\-]+'
    Default: CorpInfra
    Description: Name of the Organizational Unit under which the PKI servers will be placed
    MaxLength: '25'
    MinLength: '1'
    Type: String
  CaKeyLength:
    AllowedValues:
      - '2048'
      - '4096'
    Default: '2048'
    Description: Key length for CA certificates (2048 or 4096 bits)
    Type: String
  CaHashAlgorithm:
    AllowedValues:
      - SHA256
      - SHA384
      - SHA512
    Default: SHA256
    Description: Hash algorithm for CA certificates (SHA256, SHA384, or SHA512)
    Type: String
  CaValidityPeriodUnits:
    Description: Validity period for CA certificates (in years)
    Default: '5'
    Type: String
  EnableAdvancedAuditing:
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
    Description: Enable advanced auditing
    Type: String
  AssetsBucket:
    AllowedPattern: ^[0-9a-zA-Z]+([0-9a-zA-Z-]*[0-9a-zA-Z])*$
    Default: aws-quickstart
    Description: S3 bucket name for the Quick Start assets. Quick Start bucket name can include
      numbers, lowercase letters, uppercase letters, and hyphens (-). It cannot start or
      end with a hyphen (-).
    Type: String
  AssetsPrefix:
    AllowedPattern: ^[0-9a-zA-Z-/]*$
    Default: quickstart-microsoft-pki/
    Description: S3 key prefix for the Quick Start assets. Quick Start key prefix can include
      numbers, lowercase letters, uppercase letters, hyphens (-), and forward slash (/).
    Type: String
  QSS3BucketRegion:
    Default: 'us-east-1'
    Description: The AWS Region where the Quick Start S3 bucket (QSS3BucketName) is hosted. When using your own bucket, you must specify this value.
    Type: String
Mappings:
  AWSAMIRegionMap:
    us-east-1:
      WS2022FULLBASE: ami-0c2b0d3fb02824d92
    us-east-2:
      WS2022FULLBASE: ami-0fb8234821e6802fd
    us-west-1:
      WS2022FULLBASE: ami-0ea7dc624e77a15d5
    us-west-2:
      WS2022FULLBASE: ami-0d77c9d087c0aa0f0

Resources:
  RootCARole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Sub arn:${AWS::Partition}:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3AssetsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub arn:${AWS::Partition}:s3:::${AssetsBucket}/${AssetsPrefix}*
        - PolicyName: JoinDomain
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ds:CreateComputer
                  - ds:DescribeDirectories
                Resource: '*'

  RootCAInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref RootCARole

  SubCARole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Sub arn:${AWS::Partition}:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3AssetsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub arn:${AWS::Partition}:s3:::${AssetsBucket}/${AssetsPrefix}*
        - PolicyName: JoinDomain
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ds:CreateComputer
                  - ds:DescribeDirectories
                Resource: '*'

  SubCAInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SubCARole

  RootCASecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Root CA Security Group
      VpcId: !Ref VPCID
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          SourceSecurityGroupId: !Ref DomainMemberSGID
        - IpProtocol: tcp
          FromPort: 135
          ToPort: 135
          SourceSecurityGroupId: !Ref DomainMemberSGID
        - IpProtocol: tcp
          FromPort: 49152
          ToPort: 65535
          SourceSecurityGroupId: !Ref DomainMemberSGID
        - IpProtocol: tcp
          FromPort: 445
          ToPort: 445
          SourceSecurityGroupId: !Ref DomainMemberSGID
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RootCA-SG

  SubCASecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Subordinate CA Security Group
      VpcId: !Ref VPCID
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          SourceSecurityGroupId: !Ref DomainMemberSGID
        - IpProtocol: tcp
          FromPort: 135
          ToPort: 135
          SourceSecurityGroupId: !Ref DomainMemberSGID
        - IpProtocol: tcp
          FromPort: 49152
          ToPort: 65535
          SourceSecurityGroupId: !Ref DomainMemberSGID
        - IpProtocol: tcp
          FromPort: 445
          ToPort: 445
          SourceSecurityGroupId: !Ref DomainMemberSGID
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SubCA-SG
  RootCAWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  RootCAWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: RootCAInstance
    Properties:
      Handle: !Ref RootCAWaitHandle
      Timeout: '3600'
      Count: 1

  SubCAWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  SubCAWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: SubCAInstance
    Properties:
      Handle: !Ref SubCAWaitHandle
      Timeout: '3600'
      Count: 1

  RootCAInstance:
    Type: AWS::EC2::Instance
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - setup
            - join
            - configure
        setup:
          files:
            'C:\cfn\scripts\Initialize-RootCA.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Initialize-RootCA.ps1
            'C:\cfn\scripts\Join-Domain.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Join-Domain.ps1
            'C:\cfn\scripts\Configure-RootCA.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Configure-RootCA.ps1
          commands:
            1-initialize-ca:
              command: powershell -Command "C:\cfn\scripts\Initialize-RootCA.ps1"
              waitAfterCompletion: 0
            2-restart-computer:
              command: powershell -Command "Restart-Computer -Force"
              waitAfterCompletion: forever
        join:
          commands:
            1-join-domain:
              command: powershell -Command "C:\cfn\scripts\Join-Domain.ps1"
              waitAfterCompletion: 0
            2-restart-computer:
              command: powershell -Command "Restart-Computer -Force"
              waitAfterCompletion: forever
        configure:
          commands:
            1-configure-ca:
              command: powershell -Command "C:\cfn\scripts\Configure-RootCA.ps1"
              waitAfterCompletion: 0
            2-signal-success:
              command: !Sub cfn-signal.exe -e %ERRORLEVEL% --stack ${AWS::StackName} --resource RootCAWaitCondition --region ${AWS::Region}
              waitAfterCompletion: 0
    Properties:
      ImageId: !FindInMap 
        - AWSAMIRegionMap
        - !Ref AWS::Region
        - WS2022FULLBASE
      InstanceType: !Ref AdcaInstanceType
      SubnetId: !Ref SubnetID
      IamInstanceProfile: !Ref RootCAInstanceProfile
      SecurityGroupIds: 
        - !Ref RootCASecurityGroup
        - !Ref DomainMemberSGID
      Tags:
        - Key: Name
          Value: !Ref AdcaServerNetBIOSName
      UserData:
        Fn::Base64:
          Fn::Join:
            - ''
            - - "<powershell>\n"
              - "# Set required environment variables\n"
              - !Sub "$env:COMPUTERNAME = '${AdcaServerNetBIOSName}'\n"
              - !Sub "$env:DOMAIN_ADMIN_USER = '${DomainAdminUser}'\n"
              - !Sub "$env:DOMAIN_ADMIN_PASSWORD = '${DomainAdminPassword}'\n"
              - !Sub "$env:DOMAIN_DNS_NAME = '${DomainDNSName}'\n"
              - !Sub "$env:DOMAIN_NETBIOS_NAME = '${DomainNetBIOSName}'\n"
              - !Sub "$env:CA_KEY_LENGTH = '${CaKeyLength}'\n"
              - !Sub "$env:CA_HASH_ALGORITHM = '${CaHashAlgorithm}'\n"
              - !Sub "$env:CA_VALIDITY_PERIOD = '${CaValidityPeriodUnits}'\n"
              - !Sub "$env:OU_NAME = '${OrganizationalUnitName}'\n"
              - !Sub "$env:ENABLE_ADVANCED_AUDITING = '${EnableAdvancedAuditing}'\n"
              - "\n"
              - "# Create required directories\n"
              - "New-Item -ItemType Directory -Force -Path 'C:\\cfn\\scripts'\n"
              - "New-Item -ItemType Directory -Force -Path 'C:\\cfn\\log'\n"
              - "\n"
              - "# Initialize CFN\n"
              - !Sub "cfn-init.exe -v --stack ${AWS::StackName} --resource RootCAInstance --configsets default --region ${AWS::Region}\n"
              - "</powershell>\n"
  RootCAWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  RootCAWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: RootCAInstance
    Properties:
      Handle: !Ref RootCAWaitHandle
      Timeout: '3600'
      Count: 1

  SubCAWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  SubCAWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: SubCAInstance
    Properties:
      Handle: !Ref SubCAWaitHandle
      Timeout: '3600'
      Count: 1

  RootCAInstance:
    Type: AWS::EC2::Instance
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - setup
            - join
            - configure
        setup:
          files:
            'C:\cfn\scripts\Initialize-RootCA.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Initialize-RootCA.ps1
            'C:\cfn\scripts\Join-Domain.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Join-Domain.ps1
            'C:\cfn\scripts\Configure-RootCA.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Configure-RootCA.ps1
          commands:
            1-initialize-ca:
              command: powershell -Command "C:\cfn\scripts\Initialize-RootCA.ps1"
              waitAfterCompletion: 0
            2-restart-computer:
              command: powershell -Command "Restart-Computer -Force"
              waitAfterCompletion: forever
        join:
          commands:
            1-join-domain:
              command: powershell -Command "C:\cfn\scripts\Join-Domain.ps1"
              waitAfterCompletion: 0
            2-restart-computer:
              command: powershell -Command "Restart-Computer -Force"
              waitAfterCompletion: forever
        configure:
          commands:
            1-configure-ca:
              command: powershell -Command "C:\cfn\scripts\Configure-RootCA.ps1"
              waitAfterCompletion: 0
            2-signal-success:
              command: !Sub cfn-signal.exe -e %ERRORLEVEL% --stack ${AWS::StackName} --resource RootCAWaitCondition --region ${AWS::Region}
              waitAfterCompletion: 0
    Properties:
      ImageId: !FindInMap 
        - AWSAMIRegionMap
        - !Ref AWS::Region
        - WS2022FULLBASE
      InstanceType: !Ref AdcaInstanceType
      SubnetId: !Ref SubnetID
      IamInstanceProfile: !Ref RootCAInstanceProfile
      SecurityGroupIds: 
        - !Ref RootCASecurityGroup
        - !Ref DomainMemberSGID
      Tags:
        - Key: Name
          Value: !Ref AdcaServerNetBIOSName
      UserData:
        Fn::Base64:
          Fn::Join:
            - ''
            - - "<powershell>\n"
              - "# Set required environment variables\n"
              - !Sub "$env:COMPUTERNAME = '${AdcaServerNetBIOSName}'\n"
              - !Sub "$env:DOMAIN_ADMIN_USER = '${DomainAdminUser}'\n"
              - !Sub "$env:DOMAIN_ADMIN_PASSWORD = '${DomainAdminPassword}'\n"
              - !Sub "$env:DOMAIN_DNS_NAME = '${DomainDNSName}'\n"
              - !Sub "$env:DOMAIN_NETBIOS_NAME = '${DomainNetBIOSName}'\n"
              - !Sub "$env:CA_KEY_LENGTH = '${CaKeyLength}'\n"
              - !Sub "$env:CA_HASH_ALGORITHM = '${CaHashAlgorithm}'\n"
              - !Sub "$env:CA_VALIDITY_PERIOD = '${CaValidityPeriodUnits}'\n"
              - !Sub "$env:OU_NAME = '${OrganizationalUnitName}'\n"
              - !Sub "$env:ENABLE_ADVANCED_AUDITING = '${EnableAdvancedAuditing}'\n"
              - "\n"
              - "# Create required directories\n"
              - "New-Item -ItemType Directory -Force -Path 'C:\\cfn\\scripts'\n"
              - "New-Item -ItemType Directory -Force -Path 'C:\\cfn\\log'\n"
              - "\n"
              - "# Initialize CFN\n"
              - !Sub "cfn-init.exe -v --stack ${AWS::StackName} --resource RootCAInstance --configsets default --region ${AWS::Region}\n"
              - "</powershell>\n"
  SubCAInstance:
    Type: AWS::EC2::Instance
    DependsOn: RootCAWaitCondition
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - setup
            - join
            - configure
        setup:
          files:
            'C:\cfn\scripts\Initialize-SubCA.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Initialize-SubCA.ps1
            'C:\cfn\scripts\Join-Domain.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Join-Domain.ps1
            'C:\cfn\scripts\Configure-SubCA.ps1':
              source: !Sub https://${AssetsBucket}.s3.${QSS3BucketRegion}.amazonaws.com/${AssetsPrefix}scripts/Configure-SubCA.ps1
          commands:
            1-initialize-ca:
              command: powershell -Command "C:\cfn\scripts\Initialize-SubCA.ps1"
              waitAfterCompletion: 0
            2-restart-computer:
              command: powershell -Command "Restart-Computer -Force"
              waitAfterCompletion: forever
        join:
          commands:
            1-join-domain:
              command: powershell -Command "C:\cfn\scripts\Join-Domain.ps1"
              waitAfterCompletion: 0
            2-restart-computer:
              command: powershell -Command "Restart-Computer -Force"
              waitAfterCompletion: forever
        configure:
          commands:
            1-configure-ca:
              command: powershell -Command "C:\cfn\scripts\Configure-SubCA.ps1"
              waitAfterCompletion: 0
            2-signal-success:
              command: !Sub cfn-signal.exe -e %ERRORLEVEL% --stack ${AWS::StackName} --resource SubCAWaitCondition --region ${AWS::Region}
              waitAfterCompletion: 0
    Properties:
      ImageId: !FindInMap 
        - AWSAMIRegionMap
        - !Ref AWS::Region
        - WS2022FULLBASE
      InstanceType: !Ref SubcaInstanceType
      SubnetId: !Ref SubnetID
      IamInstanceProfile: !Ref SubCAInstanceProfile
      SecurityGroupIds: 
        - !Ref SubCASecurityGroup
        - !Ref DomainMemberSGID
      Tags:
        - Key: Name
          Value: !Ref SubcaServerNetBIOSName
      UserData:
        Fn::Base64:
          Fn::Join:
            - ''
            - - "<powershell>\n"
              - "# Set required environment variables\n"
              - !Sub "$env:COMPUTERNAME = '${SubcaServerNetBIOSName}'\n"
              - !Sub "$env:DOMAIN_ADMIN_USER = '${DomainAdminUser}'\n"
              - !Sub "$env:DOMAIN_ADMIN_PASSWORD = '${DomainAdminPassword}'\n"
              - !Sub "$env:DOMAIN_DNS_NAME = '${DomainDNSName}'\n"
              - !Sub "$env:DOMAIN_NETBIOS_NAME = '${DomainNetBIOSName}'\n"
              - !Sub "$env:ROOT_CA_NAME = '${AdcaServerNetBIOSName}'\n"
              - !Sub "$env:CA_KEY_LENGTH = '${CaKeyLength}'\n"
              - !Sub "$env:CA_HASH_ALGORITHM = '${CaHashAlgorithm}'\n"
              - !Sub "$env:CA_VALIDITY_PERIOD = '${CaValidityPeriodUnits}'\n"
              - !Sub "$env:OU_NAME = '${OrganizationalUnitName}'\n"
              - !Sub "$env:ENABLE_ADVANCED_AUDITING = '${EnableAdvancedAuditing}'\n"
              - "\n"
              - "# Create required directories\n"
              - "New-Item -ItemType Directory -Force -Path 'C:\\cfn\\scripts'\n"
              - "New-Item -ItemType Directory -Force -Path 'C:\\cfn\\log'\n"
              - "\n"
              - "# Initialize CFN\n"
              - !Sub "cfn-init.exe -v --stack ${AWS::StackName} --resource SubCAInstance --configsets default --region ${AWS::Region}\n"
              - "</powershell>\n"

Outputs:
  RootCAInstanceId:
    Description: Root CA Instance ID
    Value: !Ref RootCAInstance

  RootCAPrivateIP:
    Description: Root CA Private IP Address
    Value: !GetAtt RootCAInstance.PrivateIp

  SubCAInstanceId:
    Description: Subordinate CA Instance ID
    Value: !Ref SubCAInstance

  SubCAPrivateIP:
    Description: Subordinate CA Private IP Address
    Value: !GetAtt SubCAInstance.PrivateIp

  DomainAdmin:
    Description: Domain administrator account
    Value: !Sub ${DomainNetBIOSName}\${DomainAdminUser}

  RootCASecurityGroupID:
    Description: Root CA Security Group ID
    Value: !Ref RootCASecurityGroup

  SubCASecurityGroupID:
    Description: Subordinate CA Security Group ID
    Value: !Ref SubCASecurityGroup
